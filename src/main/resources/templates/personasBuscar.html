<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header(#{persona.buscar.titulo})}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold" th:text="#{persona.buscar.titulo}"></h2>
            <p class="text-muted" th:text="#{empresa}"></p>
        </div>
    </div>

    <!-- Formulario de Búsqueda y Filtros -->
    <div class="card p-4 mb-4">
        <form th:action="@{/personasBuscar}" th:object="${formBean}" method="post">
            <!-- Mensajes globales -->
            <div th:each="err : ${#fields.errors('global')}" class="alert alert-danger mb-3" th:text="${err}"></div>

            <div class="row g-3">
                <div class="col-md-4">
                    <label for="dniCuit" class="form-label fw-bold" th:text="#{persona.dniCuit}"></label>
                    <input type="text" id="dniCuit" class="form-control" th:field="*{dniCuit}"/>
                </div>
                <div class="col-md-4">
                    <label for="nombre" class="form-label fw-bold" th:text="#{persona.nombre}"></label>
                    <input type="text" id="nombre" class="form-control" th:field="*{nombre}"/>
                </div>
                <div class="col-md-4">
                    <label for="ciudadSeleccionada" class="form-label fw-bold" th:text="#{persona.ciudad}"></label>
                    <select id="ciudadSeleccionada" class="form-select" th:field="*{ciudadSeleccionada}">
                        <option value="">Todas</option>
                        <option th:each="c : ${allCiudades}" 
                                th:value="${c.id}" 
                                th:text="${c.nombre}"></option>
                    </select>
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end mt-4">
                    <input type="submit" name="action" value="Buscar" class="btn btn-primary" />
                    <input type="submit" name="action" value="Cancelar" class="btn btn-secondary" />
                    <input type="submit" name="action" value="Registrar" class="btn btn-success" />
                </div>
            </div>

            <!-- Resultados -->
            <div class="table-container mt-4" th:if="${resultados != null}">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th th:text="#{persona.dniCuit}"></th>
                            <th th:text="#{persona.nombre}"></th>
                            <th th:text="#{persona.apellido}"></th>
                            <th th:text="#{persona.telefono}"></th>
                            <th th:text="#{persona.email}"></th>
                            <th th:text="#{persona.domicilio}"></th>
                            <th th:text="#{persona.ciudad}"></th>
                            <th class="text-end" style="width: 200px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${resultados}">
                            <td th:text="${p.dniCuit}"></td>
                            <td th:text="${p.nombre}"></td>
                            <td th:text="${p.apellido}"></td>
                            <td th:text="${p.telefono}"></td>
                            <td th:text="${p.email}"></td>
                            <td th:text="${p.domicilio}"></td>
                            <td th:text="${p.ciudad == null ? '' : p.ciudad.nombre}"></td>
                            <td class="text-end">
                                <a th:href="@{/personasEditar/{id}(id=${p.id})}" 
                                   class="btn btn-sm btn-warning me-2" 
                                   th:text="#{links.editar}">
                                </a>
                                <button type="submit"
                                        th:formaction="@{/personasEditar/delete/{id}(id=${p.id})}"
                                        formmethod="post"
                                        class="btn btn-sm btn-danger"
                                        th:text="#{links.eliminar}"
                                        onclick="return confirm('¿Estás seguro que deseas eliminar esta persona?');">
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(resultados)}">
                            <td colspan="8" class="text-center text-muted">No se encontraron resultados</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
