<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title><span th:text="#{persona.buscar.titulo}"></span></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
    <div class="starter-template">
        <h1><span th:text="#{empresa}"></span></h1>
        <h2><span th:text="#{persona.buscar.titulo}"></span></h2>
    </div>

    <form th:action="@{/personasBuscar}" th:object="${formBean}" method="post">
        <table border="1" style="align-self: center;">
            <tr>
                <td><label th:text="#{persona.dniCuit}"></label></td>
                <td><input type="text" th:field="*{dniCuit}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.nombre}"></label></td>
                <td><input type="text" th:field="*{nombre}" /></td>
            </tr>
            <tr>
            <td><label th:text="#{persona.ciudad}" /></td>
            <td>
		        <select th:field="*{ciudadSeleccionada}">
				  <option value="">Todas</option>
				  <option th:each="c : ${allCiudades}" 
				          th:value="${c.id}" 
				          th:text="${c.nombre}"></option>
				</select>
			</td>
            </tr>
        </table>

        <table class="botones">
            <tr>
                <td><input type="submit" name="action" value="Buscar" /></td>
                <td><input type="submit" name="action" value="Cancelar" /></td>
                <td><input type="submit" name="action" value="Registrar" /></td>
            </tr>
        </table>

        <table class="resultados" border="0" style="align-self: center;">
            <thead>
                <tr>
                    <th><label th:text="#{persona.dniCuit}"></label></th>
                    <th><label th:text="#{persona.nombre}"></label></th>
                    <th><label th:text="#{persona.apellido}"></label></th>
                    <th><label th:text="#{persona.telefono}"></label></th>
                    <th><label th:text="#{persona.email}"></label></th>
                    <th><label th:text="#{persona.domicilio}"></label></th>
                    <th><label th:text="#{persona.ciudad}"></label></th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${resultados}">
                    <td th:text="${p.dniCuit}"></td>
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.apellido}"></td>
                    <td th:text="${p.telefono}"></td>
                    <td th:text="${p.email}"></td>
                    <td th:text="${p.domicilio}"></td>
                    <td th:text="${p.ciudad == null ? '' : p.ciudad.nombre}"></td>
                    <td>
                        <a th:href="@{/personasEditar/{id}(id=${p.id})}" class="btn btn-primary">editar</a>
                    </td>
                    <td>
                        <button type="submit"
                                th:formaction="@{/personasEditar/delete/{id}(id=${p.id})}"
                                formmethod="post"
                                class="btn btn-primary"
                                onclick="return confirm('¿Estás seguro que deseas eliminar esta persona?');">
                            eliminar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
