<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header(${formBean.id} ? #{provincia.editar.titulo} : #{provincia.registrar.titulo})}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="fw-bold mb-3 text-center" th:text="${formBean.id} ? #{provincia.editar.titulo} : #{provincia.registrar.titulo}"></h2>
                <p class="text-muted text-center mb-4" th:text="#{empresa}"></p>

                <form th:action="@{/provinciaEditar}" th:object="${formBean}" method="post">
                    <!-- Mensajes de error global -->
                    <div th:each="err : ${#fields.errors('global')}" class="alert alert-danger mb-3" th:text="${err}"></div>

                    <input type="hidden" id="id" th:field="*{id}">

                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-bold" th:text="#{provincia.nombre}"></label>
                        <input type="text" id="nombre" class="form-control" th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <button type="submit" name="action" value="actionCancelar" class="btn btn-secondary" th:text="#{botones.cancelar}"></button>
                        <button type="submit" name="action" value="actionAceptar" class="btn btn-primary" th:text="#{botones.aceptar}"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
