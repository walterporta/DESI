<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h2, h3 {
            color: #333;
        }
        .formulario-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        .formulario-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .formulario-table td:first-child {
            width: 25%;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn {
            padding: 6px 12px;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            color: white;
            border-radius: 4px;
        }
        .alert-danger {
            background-color: #dc3545;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <h2>Gestión de Publicaciones (Epic 2)</h2>
    
    <h3 th:text="${publicacionForm.id != null} ? 'Modificar Publicación' : 'Registrar Nueva Publicación'">Registrar Nueva Publicación</h3>

    <form th:action="@{/publicaciones/registrar}" th:object="${publicacionForm}" method="post">
        
        <div th:if="${#fields.hasErrors('global')}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.errors('global')}" th:text="${err}"></li>
            </ul>
        </div>
        
        <input type="hidden" th:field="*{id}" />

        <table class="formulario-table">
            
            <tr>
                <td><label for="propiedadId">Seleccionar Propiedad:</label></td>
                <td>
                    <select id="propiedadId" th:field="*{propiedadId}">
                        <option value="">-- Seleccione una Propiedad --</option>
                        <option th:each="prop : ${allPropiedades}" 
                                th:value="${prop.id}" 
                                th:text="${prop.direccion + ' - ' + prop.ciudad}"></option>
                    </select>
                    <span class="error-message" th:if="${#fields.hasErrors('propiedadId')}" th:errors="*{propiedadId}"></span>
                </td>
            </tr>

            <tr>
                <td><label for="precioMensual">Precio Mensual ($):</label></td>
                <td>
                    <input type="number" id="precioMensual" th:field="*{precioMensual}" placeholder="Ej: 150000.00" step="0.01" min="0" />
                    <span class="error-message" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></span>
                </td>
            </tr>

            <tr>
                <td><label for="estado">Estado:</label></td>
                <td>
                    <select id="estado" th:field="*{estado}">
                        <option th:each="est : ${allEstados}" 
                                th:value="${est}" 
                                th:text="${est}"></option>
                    </select>
                    <span class="error-message" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></span>
                </td>
            </tr>

            <tr>
                <td><label for="descripcion">Descripción:</label></td>
                <td>
                    <textarea id="descripcion" th:field="*{descripcion}" placeholder="Describa la publicación..."></textarea>
                    <span class="error-message" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
                </td>
            </tr>

            <tr>
                <td><label for="condiciones">Condiciones Contractuales:</label></td>
                <td>
                    <textarea id="condiciones" th:field="*{condiciones}" placeholder="Condiciones..."></textarea>
                    <span class="error-message" th:if="${#fields.hasErrors('condiciones')}" th:errors="*{condiciones}"></span>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <button type="submit" name="action" value="actionAceptar" class="btn btn-success" 
                            th:text="${publicacionForm.id != null} ? 'Modificar' : 'Guardar'">Guardar</button>
                    
                    <button type="submit" name="action" value="actionCancelar" class="btn btn-secondary">Cancelar / Volver</button>
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
