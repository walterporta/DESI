<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header(${publicacionForm.id != null} ? 'Modificar Publicación' : 'Registrar Nueva Publicación')}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="fw-bold mb-3 text-center">Gestión de Publicaciones (Epic 2)</h2>
                <h3 class="fs-5 text-muted text-center mb-4" th:text="${publicacionForm.id != null} ? 'Modificar Publicación' : 'Registrar Nueva Publicación'"></h3>

                <form th:action="@{/publicaciones/registrar}" th:object="${publicacionForm}" method="post">
                    <!-- Errores globales -->
                    <div th:if="${#fields.hasErrors('global')}" class="alert alert-danger mb-3">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.errors('global')}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <input type="hidden" th:field="*{id}" />

                    <!-- Selección de Propiedad -->
                    <div class="mb-3">
                        <label for="propiedadId" class="form-label">Seleccionar Propiedad *</label>
                        <select id="propiedadId" class="form-select" th:field="*{propiedadId}" th:classappend="${#fields.hasErrors('propiedadId')} ? 'is-invalid' : ''">
                            <option value="">-- Seleccione una Propiedad --</option>
                            <option th:each="prop : ${allPropiedades}" 
                                    th:value="${prop.id}" 
                                    th:text="${prop.direccion + ' - ' + prop.ciudad}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('propiedadId')}" th:errors="*{propiedadId}"></div>
                    </div>

                    <!-- Precio Mensual -->
                    <div class="mb-3">
                        <label for="precioMensual" class="form-label">Precio Mensual ($) *</label>
                        <input type="number" id="precioMensual" class="form-control" th:field="*{precioMensual}" placeholder="Ej: 150000.00" step="0.01" min="0" th:classappend="${#fields.hasErrors('precioMensual')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></div>
                    </div>

                    <!-- Estado -->
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado *</label>
                        <select id="estado" class="form-select" th:field="*{estado}" th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid' : ''">
                            <option th:each="est : ${allEstados}" 
                                    th:value="${est}" 
                                    th:text="${est}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción *</label>
                        <textarea id="descripcion" class="form-control" th:field="*{descripcion}" placeholder="Describa la publicación..." rows="3" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                    </div>

                    <!-- Condiciones -->
                    <div class="mb-3">
                        <label for="condiciones" class="form-label">Condiciones Contractuales *</label>
                        <textarea id="condiciones" class="form-control" th:field="*{condiciones}" placeholder="Condiciones..." rows="3" th:classappend="${#fields.hasErrors('condiciones')} ? 'is-invalid' : ''"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('condiciones')}" th:errors="*{condiciones}"></div>
                    </div>

                    <!-- Acciones -->
                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <button type="submit" name="action" value="actionCancelar" class="btn btn-secondary">Cancelar</button>
                        <button type="submit" name="action" value="actionAceptar" class="btn btn-primary" 
                                th:text="${publicacionForm.id != null} ? 'Modificar' : 'Guardar'">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
