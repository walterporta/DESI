<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header('HogarYa - Buscar Publicaciones')}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <h2>Gestión de Publicaciones (Epic 2)</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Filtros de Búsqueda -->
    <div class="card p-4 mb-4">
        <form th:action="@{/publicacionesBuscar}" th:object="${publicacionesBuscarForm}" method="post">
            <h3 class="fs-5 fw-bold mb-3">Filtros de Búsqueda</h3>
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="propiedad" class="form-label">Propiedad (Dirección):</label>
                    <input type="text" id="propiedad" class="form-control" th:field="*{propiedad}" placeholder="Ej: San Martín" />
                </div>
                <div class="col-md-3">
                    <label for="ciudad" class="form-label">Ciudad:</label>
                    <input type="text" id="ciudad" class="form-control" th:field="*{ciudad}" placeholder="Ej: Córdoba" />
                </div>
                <div class="col-md-2">
                    <label for="estado" class="form-label">Estado:</label>
                    <select id="estado" class="form-select" th:field="*{estado}">
                        <option value="">-- Todos --</option>
                        <option value="ACTIVA">ACTIVA</option>
                        <option value="PAUSADA">PAUSADA</option>
                        <option value="FINALIZADA">FINALIZADA</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Precio Rango ($):</label>
                    <div class="d-flex align-items-center gap-1">
                        <input type="number" class="form-control" th:field="*{precioMinimo}" placeholder="Mín" step="0.01" />
                        <span>-</span>
                        <input type="number" class="form-control" th:field="*{precioMaximo}" placeholder="Máx" step="0.01" />
                    </div>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">Filtrar</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Botones de Acción -->
    <div class="mb-3">
        <a th:href="@{/publicaciones/registrar}" class="btn btn-success">+ Nueva Publicación</a>
    </div>

    <!-- Resultados -->
    <div class="table-container">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Identificador</th>
                    <th>Dirección</th>
                    <th>Ciudad</th>
                    <th>Precio Mensual</th>
                    <th>Fecha Publicación</th>
                    <th>Estado</th>
                    <th class="text-end" style="width: 200px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${publicaciones}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.propiedad.direccion}"></td>
                    <td th:text="${p.propiedad.ciudad}"></td>
                    <td th:text="${'$ ' + p.precioMensual}"></td>
                    <td th:text="${#temporals.format(p.fechaPublicacion, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${p.estado.name() == 'ACTIVA' ? 'bg-success' : 
                                               (p.estado.name() == 'PAUSADA' ? 'bg-secondary' : 'bg-danger')}"
                              th:text="${p.estado}">
                        </span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/publicaciones/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning me-2">Modificar</a>
                        <a th:href="@{/publicaciones/eliminar/{id}(id=${p.id})}" 
                           class="btn btn-sm btn-danger" 
                           onclick="return confirm('¿Está seguro de que desea eliminar esta publicación?');">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(publicaciones)}">
                    <td colspan="7" class="text-center text-muted">No se encontraron publicaciones vigentes con los criterios ingresados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
