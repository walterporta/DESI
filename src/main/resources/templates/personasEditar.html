<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header(${formBean.id} ? #{persona.editar.titulo} : #{persona.registrar.titulo})}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="fw-bold mb-3 text-center" th:text="${formBean.id} ? #{persona.editar.titulo} : #{persona.registrar.titulo}"></h2>
                <p class="text-muted text-center mb-4" th:text="#{empresa}"></p>

                <form th:action="@{/personasEditar}" th:object="${formBean}" method="post">
                    <!-- Mensajes de error global -->
                    <div th:each="err : ${#fields.errors('global')}" class="alert alert-danger mb-3" th:text="${err}"></div>

                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="dniCuit" class="form-label fw-bold" th:text="#{persona.dniCuit}"></label>
                            <input type="text" id="dniCuit" class="form-control" th:field="*{dniCuit}" maxlength="11" th:classappend="${#fields.hasErrors('dniCuit')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('dniCuit')}" th:errors="*{dniCuit}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="nombre" class="form-label fw-bold" th:text="#{persona.nombre}"></label>
                            <input type="text" id="nombre" class="form-control" th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="apellido" class="form-label fw-bold" th:text="#{persona.apellido}"></label>
                            <input type="text" id="apellido" class="form-control" th:field="*{apellido}" th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="telefono" class="form-label fw-bold" th:text="#{persona.telefono}"></label>
                            <input type="tel" id="telefono" class="form-control" th:field="*{telefono}" th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label fw-bold" th:text="#{persona.email}"></label>
                            <input type="email" id="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="domicilio" class="form-label fw-bold" th:text="#{persona.domicilio}"></label>
                            <input type="text" id="domicilio" class="form-control" th:field="*{domicilio}" th:classappend="${#fields.hasErrors('domicilio')} ? 'is-invalid' : ''" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('domicilio')}" th:errors="*{domicilio}"></div>
                        </div>

                        <div class="col-md-12">
                            <label for="idCiudad" class="form-label fw-bold" th:text="#{persona.ciudad}"></label>
                            <select id="idCiudad" class="form-select" th:field="*{idCiudad}" th:classappend="${#fields.hasErrors('idCiudad')} ? 'is-invalid' : ''">
                                <option value=""></option>
                                <option th:each="c : ${allCiudades}" 
                                        th:value="${c.id}" 
                                        th:text="${c.nombre}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('idCiudad')}" th:errors="*{idCiudad}"></div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <input type="submit" name="action" value="Cancelar" class="btn btn-secondary" />
                        <input type="submit" name="action" value="Aceptar" class="btn btn-primary" />
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
