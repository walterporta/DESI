<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: header('HogarYa - Buscar Propiedades')}"></head>
<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container my-4">
    <h2>Listado de Propiedades</h2>

    <!-- Mensaje de error al eliminar -->
    <div th:if="${errorEliminar}" class="alert alert-danger" th:text="${errorEliminar}"></div>

    <!-- Filtros -->
    <div class="card p-4 mb-4">
        <form th:action="@{/propiedadesBuscar}" method="get" th:object="${filterBean}" class="row g-3">
            <div class="col-md-3">
                <input type="text" class="form-control" placeholder="Dirección" th:field="*{direccion}"/>
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" placeholder="Ciudad" th:field="*{ciudad}"/>
            </div>
            <div class="col-md-2">
                <select class="form-select" th:field="*{tipo}">
                    <option value="">-- Tipo --</option>
                    <option th:each="t : ${allTipos}" th:value="${t}" th:text="${t}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" th:field="*{estado}">
                    <option value="">-- Estado --</option>
                    <option th:each="e : ${allEstados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Filtrar</button>
            </div>
        </form>
    </div>

    <!-- Botón nueva propiedad -->
    <a th:href="@{/propiedadesEditar}" class="btn btn-success mb-3">+ Nueva Propiedad</a>

    <!-- Tabla -->
    <div class="table-container">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Dirección</th>
                    <th>Ciudad</th>
                    <th>Tipo</th>
                    <th>Ambientes</th>
                    <th>M²</th>
                    <th>Estado</th>
                    <th>Propietario</th>
                    <th class="text-end" style="width: 180px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${propiedades}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.direccion}"></td>
                    <td th:text="${p.ciudad}"></td>
                    <td th:text="${p.tipo}"></td>
                    <td th:text="${p.cantidadAmbientes}"></td>
                    <td th:text="${p.metrosCuadrados}"></td>
                    <td th:text="${p.estadoDisponibilidad}"></td>
                    <td th:text="${p.propietario != null ? p.propietario.nombre + ' ' + p.propietario.apellido : '-'}"></td>
                    <td class="text-end">
                        <a th:href="@{/propiedadesEditar/{id}(id=${p.id})}" class="btn btn-sm btn-warning me-2">Editar</a>
                        <form th:action="@{/propiedadesEditar/delete/{id}(id=${p.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('¿Eliminar esta propiedad?')">Eliminar</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(propiedades)}">
                    <td colspan="9" class="text-center text-muted">No hay propiedades registradas</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
