<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Propiedades</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Propiedades (Epic 1)</h2>

    <!-- Mensaje de error al eliminar -->
    <div th:if="${errorEliminar}" class="alert alert-danger" th:text="${errorEliminar}"></div>

    <!-- Filtros -->
    <form th:action="@{/propiedadesBuscar}" method="get" th:object="${filterBean}" class="row g-2 mb-4">
        <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Dirección" th:field="*{direccion}"/>
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Ciudad" th:field="*{ciudad}"/>
        </div>
        <div class="col-md-2">
            <select class="form-select" th:field="*{tipo}">
                <option value="">-- Tipo --</option>
                <option th:each="t : ${allTipos}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select class="form-select" th:field="*{estado}">
                <option value="">-- Estado --</option>
                <option th:each="e : ${allEstados}" th:value="${e}" th:text="${e}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Filtrar</button>
        </div>
    </form>

    <!-- Botón nueva propiedad -->
    <a th:href="@{/propiedadesEditar}" class="btn btn-success mb-3">+ Nueva Propiedad</a>
        <a th:href="@{/}" class="btn btn-secondary mb-3">Menu</a>
    <!-- Tabla -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Ambientes</th>
                <th>M²</th>
                <th>Estado</th>
                <th>Propietario</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${propiedades}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.direccion}"></td>
                <td th:text="${p.ciudad}"></td>
                <td th:text="${p.tipo}"></td>
                <td th:text="${p.cantidadAmbientes}"></td>
                <td th:text="${p.metrosCuadrados}"></td>
                <td th:text="${p.estadoDisponibilidad}"></td>
                <td th:text="${p.propietario != null ? p.propietario.nombre + ' ' + p.propietario.apellido : '-'}"></td>
                <td>
                    <a th:href="@{/propiedadesEditar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <form th:action="@{/propiedadesEditar/delete/{id}(id=${p.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('¿Eliminar esta propiedad?')">Eliminar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(propiedades)}">
                <td colspan="9" class="text-center">No hay propiedades registradas</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
